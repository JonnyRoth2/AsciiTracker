<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ASCII Face</title>
<style>
  html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
  #stack { position: relative; height: 100%; }
  #stack pre {
    margin: 0; position: absolute; left: 50%; top: 50%;
    transform: translate(-50%, -50%); white-space: pre;
  }
  #bg { color: #3a3a3a; }
  #face { color: #4dff7c; }
  #status {
    position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
    color: #9f9; background: rgba(0,0,0,.7); border: 1px solid #363;
    font: 13px monospace; padding: 4px 10px; border-radius: 6px; z-index: 2;
  }
  #hint {
    position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
    color: #454; font: 12px monospace; z-index: 2;
  }
  #controls {
    position: fixed; bottom: 8px; right: 12px; z-index: 2;
    display: flex; gap: 12px; align-items: center;
    color: #676; font: 12px monospace;
    background: rgba(0,0,0,.7); padding: 6px 10px; border-radius: 6px;
  }
  #controls label { display: flex; gap: 6px; align-items: center; }
  #controls input[type="color"] {
    width: 28px; height: 20px; padding: 0; border: 1px solid #333;
    border-radius: 4px; background: none; cursor: pointer;
  }
</style>
</head>
<body>
<div id="status">starting camera…</div>
<div id="stack"><pre id="bg"></pre><pre id="face"></pre></div>
<div id="hint">[F] background &nbsp; [Z] zoom &nbsp; [T] tracking &nbsp; [A] avatar</div>
<div id="controls">
  <label>face <input type="color" id="faceColor" value="#4dff7c"></label>
  <label>bg <input type="color" id="bgColor" value="#3a3a3a"></label>
</div>

<script>
(async () => {
  const statusEl = document.getElementById("status");
  const bgEl = document.getElementById("bg");
  const faceEl = document.getElementById("face");
  const FONT = '10px "Cascadia Mono", Consolas, monospace';

  let showBg = true, zoom = false, track = true, avatar = false;
  addEventListener("keydown", (e) => {
    if (e.target.tagName === "INPUT") return;
    const k = e.key.toLowerCase();
    if (k === "f") showBg = !showBg;
    if (k === "z") zoom = !zoom;
    if (k === "t") track = !track;
    if (k === "a") avatar = !avatar;
  });

  // color pickers drive the two ascii layers; choices survive reloads
  const faceColor = document.getElementById("faceColor");
  const bgColor = document.getElementById("bgColor");
  const saved = JSON.parse(localStorage.getItem("asciiColors") || "{}");
  if (saved.face) faceColor.value = saved.face;
  if (saved.bg) bgColor.value = saved.bg;
  function applyColors() {
    faceEl.style.color = faceColor.value;
    bgEl.style.color = bgColor.value;
    localStorage.setItem("asciiColors",
      JSON.stringify({ face: faceColor.value, bg: bgColor.value }));
  }
  faceColor.addEventListener("input", applyColors);
  bgColor.addEventListener("input", applyColors);
  applyColors();

  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { width: 640, height: 480 },
    });
  } catch (err) {
    statusEl.textContent = "camera error: " + err.message;
    return;
  }
  const video = document.createElement("video");
  video.srcObject = stream;
  video.muted = true;
  await video.play();

  // upload at reduced size: the ascii grid is ~230 cells wide, so 480px of
  // source is already oversampled — smaller JPEGs cut the per-frame payload
  const cap = document.createElement("canvas");
  cap.width = 480;
  cap.height = Math.round(480 * video.videoHeight / video.videoWidth);
  const cctx = cap.getContext("2d");

  // measure the glyph and force line-height to twice its width, so a cell
  // is exactly 1:2 -- the backend's CHAR_ASPECT of 0.5
  const meas = document.createElement("canvas").getContext("2d");
  meas.font = FONT;
  const cellW = meas.measureText("M").width;
  const cellH = cellW * 2;
  for (const el of [bgEl, faceEl]) {
    el.style.font = FONT;
    el.style.lineHeight = cellH + "px";
  }

  let frames = 0, fps = 0, t0 = performance.now();

  // one persistent websocket: no per-frame connection setup or headers.
  // up to 2 frames stay in flight so capture/upload overlaps processing,
  // but stale frames never queue up behind slow ones.
  const ws = new WebSocket("ws://" + location.host + "/stream");
  let inflight = 0, lastOpts = "";

  ws.onopen = () => { statusEl.textContent = "connected"; };
  ws.onclose = () => {
    statusEl.textContent = "backend disconnected — restart app.py and reload";
  };
  ws.onmessage = (e) => {
    inflight--;
    const data = JSON.parse(e.data);
    bgEl.textContent = data.bg.join("\n");
    faceEl.textContent = data.face.join("\n");
    frames++;
    const now = performance.now();
    if (now - t0 > 500) {
      fps = frames / ((now - t0) / 1000);
      frames = 0;
      t0 = now;
    }
    const state = !track ? "tracking off"
      : !data.tracking ? "no face"
      : avatar ? "avatar" : "tracking";
    statusEl.textContent = state + " · " + fps.toFixed(0) + " fps";
  };

  async function tick() {
    if (ws.readyState === WebSocket.OPEN && inflight < 2) {
      const cols = Math.floor(innerWidth / cellW) - 2;
      const rows = Math.floor((innerHeight - 40) / cellH);
      const opts = JSON.stringify({ cols, rows, bg: showBg, zoom, track, avatar });
      if (opts !== lastOpts) {
        ws.send(opts);
        lastOpts = opts;
      }
      cctx.drawImage(video, 0, 0, cap.width, cap.height);
      const blob = await new Promise((r) => cap.toBlob(r, "image/jpeg", 0.6));
      if (blob && ws.readyState === WebSocket.OPEN) {
        ws.send(blob);
        inflight++;
      }
    }
    setTimeout(tick, 30);
  }
  tick();
})();
</script>
</body>
</html>
